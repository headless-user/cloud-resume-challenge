services:
  frontend:
    build: frontend
    depends_on:
      - backend
    ports: ["80:80"]

  backend:
    build: backend
    volumes:
      - type: bind
        source: /home/naruto/projects/crc/backend/    #this is my path, find you own! :P
        target: /app/

  cloudfare:
    image: cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TOKEN_TUNNEL}"]
